name: Generate Snake/Pacman

on:
  # Jalan otomatis setiap 24 jam
  schedule:
    - cron: "0 0 * * *"
  
  # Bisa dijalankan manual juga
  workflow_dispatch:
  
  # Jalan setiap ada push di branch main
  push:
    branches:
    - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Generate grafik snake/pacman-nya
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Push hasilnya ke branch 'output' agar bisa dipanggil di README
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
